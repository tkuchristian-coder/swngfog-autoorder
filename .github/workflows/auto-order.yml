name: swngfog Auto Order

on:
  workflow_dispatch:           # 由 cron-job.org 每10分鐘觸發，或手動觸發

concurrency:
  group: auto-order-run
  cancel-in-progress: false   # 若上一輪還在執行，新觸發排隊等待（不殺掉進行中的下單）

jobs:
  run-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 12        # 確保不超時

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode credentials.json
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 --decode > credentials.json

      - name: Run auto-order script
        env:
          SWNGFOG_API_KEY: ${{ secrets.SWNGFOG_API_KEY }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python main.py
