name: swngfog Auto Order

on:
  schedule:
    - cron: '*/15 * * * *'   # 每15分鐘執行一次
  workflow_dispatch:           # 允許手動觸發（測試用）

jobs:
  run-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 12        # 確保不超時（15分鐘間隔內完成）

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode credentials.json
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 --decode > credentials.json

      - name: Run auto-order script
        env:
          SWNGFOG_API_KEY: ${{ secrets.SWNGFOG_API_KEY }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python main.py
